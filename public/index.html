<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Mobile Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 40px;
      width: 340px;
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    h2 {
      margin-bottom: 10px;
      font-weight: 600;
    }

    p {
      font-size: 13px;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 10px;
      outline: none;
      font-size: 14px;
      text-align: center;
      letter-spacing: 2px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #fff;
      color: #333;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: #f1f1f1;
    }

    .error {
      color: #ffdddd;
      font-size: 12px;
      margin-bottom: 10px;
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body>

<div class="card">
  <h2>Secure Login</h2>
  <p>Enter your mobile number to continue</p>

  <input type="text" id="number" placeholder="e.g. 9876543210" maxlength="10" />

  <div class="error" id="error">Please enter a valid 10-digit number</div>

  <button onclick="submitNumber()">Continue</button>
</div>

<script>
// validate Indian mobile number (basic)
function isValidNumber(num) {
  return /^[6-9]\d{9}$/.test(num);
}

async function submitNumber() {
  const number = document.getElementById("number").value.trim();
  const error = document.getElementById("error");

  // validation
  if (!isValidNumber(number)) {
    error.style.display = "block";
    return;
  } else {
    error.style.display = "none";
  }

  try {
    const res = await fetch("https://glowspace-1hgg.onrender.com/save-number", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ number }) // ✅ backend expects number
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || "Server error");
    }

    // store session
    localStorage.setItem("userId", data.userId);
    localStorage.setItem("userNumber", number);

    // go to OTP page
    window.location.href = "otp.html";

  } catch (err) {
    error.innerText = "Server error. Try again.";
    error.style.display = "block";
    console.log(err);
  }
}
</script>

</body>
</html>
