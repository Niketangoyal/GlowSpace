<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OTP Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "Poppins", sans-serif;
  background: linear-gradient(135deg, #43cea2, #185a9d);
}

.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  width: 320px;
  color: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

h2 {
  margin-bottom: 5px;
}

p {
  font-size: 13px;
  opacity: 0.9;
}

.otp-box {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 25px 0;
}

.otp-box input {
  width: 45px;
  height: 50px;
  text-align: center;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

#message {
  margin-top: 15px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="card">
  <h2>OTP Verification</h2>
  <p>Enter the 4-digit code sent to your number</p>

  <div class="otp-box">
    <input maxlength="1" type="text" inputmode="numeric">
    <input maxlength="1" type="text" inputmode="numeric">
    <input maxlength="1" type="text" inputmode="numeric">
    <input maxlength="1" type="text" inputmode="numeric">
    <input maxlength="1" type="text" inputmode="numeric">
    <input maxlength="1" type="text" inputmode="numeric">
  </div>
  
  <button onclick="verifyOtp()">Verify</button>

  <div id="message"></div>
</div>

<script>
const inputs = document.querySelectorAll(".otp-box input");

// Auto move + restrict to numbers
inputs.forEach((input, index) => {
  input.addEventListener("input", (e) => {
    e.target.value = e.target.value.replace(/[^0-9]/g, "");

    if (e.target.value && index < inputs.length - 1) {
      inputs[index + 1].focus();
    }
  });

  // Backspace support
  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !input.value && index > 0) {
      inputs[index - 1].focus();
    }
  });
});

// Paste support
document.querySelector(".otp-box").addEventListener("paste", (e) => {
  e.preventDefault();
  const data = (e.clipboardData || window.clipboardData)
    .getData("text")
    .trim();

  if (!/^\d+$/.test(data)) return;

  data.split("").forEach((num, i) => {
    if (inputs[i]) inputs[i].value = num;
  });
});

function getOtp() {
  return [...inputs].map(i => i.value).join("");
}

async function verifyOtp() {
  const otp = getOtp();
  const userId = localStorage.getItem("userId");

  const msg = document.getElementById("message");

  const res = await fetch("http://localhost:3000/verify-otp", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ userId, otp })
  });

  const data = await res.json();

  if (data.success) {
    msg.style.color = "#00ffcc";
    msg.innerText = data.message;

    setTimeout(() => {
      window.location.href = "home.html";
    }, 1000);

  } else {
    msg.style.color = "#ffdddd";
    msg.innerText = data.message;
  }
}
</script>

</body>
</html>
